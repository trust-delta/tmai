name: CI

on:
  pull_request:
    branches: [main]
env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build
      - name: Verify assets were built
        run: test -f src/web/assets/index.html

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/tmai-app/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: crates/tmai-app/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Biome lint & format
        run: npx biome check src/
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Build
        run: pnpm build
      - name: Verify committed bundle matches fresh build (drift check)
        working-directory: ${{ github.workspace }}
        run: |
          if ! git diff --exit-code -- src/web/assets/; then
            echo "::error::src/web/assets/ drifted from a fresh build of crates/tmai-app/web. Rebuild locally (cd crates/tmai-app/web && pnpm install --frozen-lockfile && pnpm build) and commit the result."
            echo "--- git diff --stat ---"
            git diff --stat -- src/web/assets/
            exit 1
          fi

  guard:
    name: gitignore guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for files that must not be tracked
        run: |
          FORBIDDEN="CLAUDE.md"
          for f in $FORBIDDEN; do
            if [ -f "$f" ] && git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "::error::$f must not be committed. Run: git rm --cached $f"
              exit 1
            fi
          done
          echo "All clear — no forbidden files tracked."
