[changelog]
header = """
# Changelog

All notable changes to `tmai-react` are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project aims to follow [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
UI-facing changes that depend on `api-spec/` updates note the minimum spec
version required (see the `api_spec` pin in [`versions.toml`](../../versions.toml)).

Each `tmai-react` version is bundled into a `tmai` release tarball; the
mapping is recorded next to the section header.

<!-- Generated by git-cliff and then hand-edited. After `npm run changelog`, -->
<!-- two passes need manual fix-up before publishing: -->
<!-- (a) Section headings: append the bundled-tag annotation, e.g. -->
<!--     `## [1.2.0] — 2026-05-03 (bundled in [tmai v2.2.0](.../v2.2.0))`. -->
<!-- (b) Footer reference links: rewrite from the auto-emitted -->
<!--     `[1.2.0]: .../releases/tag/v1.2.0` to the bundle tag, e.g. -->
<!--     `[1.2.0]: .../releases/tag/v2.2.0`. The monorepo has no per-react -->
<!--     `vX.Y.Z` tags — only bundle tags — so the auto-emitted link 404s. -->

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group }}

{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.breaking %} [**BREAKING**]{% endif %}
{% endfor %}
{% endfor %}\
"""
footer = """
{% for release in releases %}\
{% if release.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
https://github.com/trust-delta/tmai/releases/tag/{{ release.version }}
{% else %}\
[Unreleased]: \
https://github.com/trust-delta/tmai/compare/\
{{ releases | filter(attribute="version") | first | get(key="version") | default(value="main") }}...HEAD
{% endif %}\
{% endfor %}
"""
trim = true
postprocessors = [
  # Convert bare issue/PR references (#N) to GitHub links on the monorepo.
  { pattern = '#(\d+)', replace = "[#${1}](https://github.com/trust-delta/tmai/issues/${1})" },
]

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix",  group = "Fixed" },
  { message = "^revert", group = "Fixed" },
  { message = "^docs", group = "Documentation" },
  { message = "^perf", group = "Changed" },
  # Maintenance commits — not user-visible, omit from changelog.
  { message = "^style",   skip = true },
  { message = "^refactor", skip = true },
  { message = "^test",    skip = true },
  { message = "^build",   skip = true },
  { message = "^ci",      skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore",   skip = true },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
